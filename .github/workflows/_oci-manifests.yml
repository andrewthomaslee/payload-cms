name: Reusable Build and Push Kubernetes Manifests OCI
on:
  workflow_call:
    inputs:
      tag:
        description: 'The tag to use for the pushed images'
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Build Kubernetes Manifests OCI Image
        run: nix build .#packages.x86_64-linux.kubernetes-manifests --show-trace

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image
        id: push
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/payload-cms/kubernetes-manifests
        run: |
          docker load -i result

          docker tag payload-cms/kubernetes-manifests:latest "${IMAGE_NAME}:latest"
          PUSH_OUTPUT=$(docker push "${IMAGE_NAME}:latest" 2>&1)
          echo "$PUSH_OUTPUT"
          DIGEST=$(echo "$PUSH_OUTPUT" | grep -oP 'digest: \Ksha256:[a-f0-9]+')

          if [ -n "${{ inputs.tag }}" ]; then
            docker tag payload-cms/kubernetes-manifests:latest "${IMAGE_NAME}:${{ inputs.tag }}"
            docker tag payload-cms/kubernetes-manifests:latest "${IMAGE_NAME}:latest"
            docker push "${IMAGE_NAME}:${{ inputs.tag }}"
            docker push "${IMAGE_NAME}:latest"
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign the image with GitHub OIDC Token
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/payload-cms/kubernetes-manifests
        run: |
          cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"
