name: Release

permissions:
  id-token: write
  contents: write
  packages: write
  pages: write

on:
  workflow_dispatch:

jobs:
  pre-flight:
    uses: ./.github/workflows/_flake-check.yml

  build:
    needs: pre-flight
    uses: ./.github/workflows/_build-site.yml

  shell:
    needs: pre-flight
    uses: ./.github/workflows/_build-shell.yml

  flakehub:
    needs: [build, shell]
    uses: ./.github/workflows/_flakehub.yml

  tag:
    needs: [flakehub]
    uses: ./.github/workflows/_release.yml
    secrets: inherit
