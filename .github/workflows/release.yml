name: Release

permissions:
  id-token: write
  contents: write
  packages: write
  pages: write

on:
  workflow_dispatch:

jobs:
  pre-flight:
    uses: ./.github/workflows/_flake-check.yml

  shell:
    needs: pre-flight
    uses: ./.github/workflows/_build-shell.yml

  tag:
    needs: shell
    uses: ./.github/workflows/_release.yml
    with:
      release: true
    secrets: inherit

  push-manifests:
    needs: tag
    uses: ./.github/workflows/_oci-manifests.yml
    with:
      tag: release
    secrets: inherit

  flakehub:
    needs: [shell, push-manifests]
    uses: ./.github/workflows/_flakehub.yml

  push:
    needs: tag
    uses: ./.github/workflows/_oci.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
