name: OCI

permissions:
  id-token: write
  contents: write
  packages: write
  pages: write

on:
  push:
    branches:
      - main

jobs:
  tag:
    uses: ./.github/workflows/_release.yml
    secrets: inherit
    with:
      release: true

  push:
    needs: tag
    uses: ./.github/workflows/_oci.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
