name: Reusable Release
on:
  workflow_call:
    outputs:
      tag:
        description: "The generated release tag"
        value: ${{ jobs.release.outputs.tag }}
    inputs:
      release:
        description: 'Make a git release'
        required: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.semver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Generate semver tag
        id: semver
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          TAG="0.1.${COMMIT_COUNT}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.semver.outputs.tag }} -m "Release ${{ steps.semver.outputs.tag }}" ${{ github.sha }}
          git push origin ${{ steps.semver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: ${{ inputs.release == true }}
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.semver.outputs.tag }}
          name: ${{ steps.semver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
