name: Reusable Build and Push OCI
on:
  workflow_call:
    inputs:
      tag:
        description: 'The tag to use for the pushed images'
        required: false
        type: string
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: NX1X/cloudflare-warp-action@v1
        name: Install WARP
        with:
          organization: ${{ vars.CF_WARP_ORG }}
          auth-client-id: ${{ secrets.CF_WARP_CLIENT_ID }}
          auth-client-secret: ${{ secrets.CF_WARP_CLIENT_SECRET }}
          test-connection: false

      - name: Docker Build
        run: |
          touch .env
          echo "${{ secrets.DATABASE_URL }}" >> .env
          echo "${{ secrets.PAYLOAD_SECRET }}" >> .env
          echo "${{ secrets.CRON_SECRET }}" >> .env
          echo "${{ secrets.PREVIEW_SECRET }}" >> .env
          echo "${{ vars.NEXT_PUBLIC_SERVER_URL }}" >> .env

          docker build . --network=host --no-cache --secret id=env-file,src=.env -t payload-cms:latest

          rm -fr .env

      - name: Load, Tag, and Push Docker image
        run: |
          # Load the image and capture the output to find the hash tag
          LOAD_OUTPUT=$(docker load -i result)
          # Expected output: "Loaded image: name:hash"
          LOADED_IMAGE=$(echo "$LOAD_OUTPUT" | grep -oP 'Loaded image: \K.*')
          
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/payload-cms/site"
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          SEMVER_TAG="${{ inputs.tag }}"
          
          # The loaded image is already tagged with the derivation hash
          # Tag with semver and latest
          docker tag $LOADED_IMAGE $IMAGE_NAME:$SEMVER_TAG
          docker tag $LOADED_IMAGE $IMAGE_NAME:latest
          
          # Push all tags
          docker push $IMAGE_NAME:$SEMVER_TAG
          docker push $IMAGE_NAME:latest
          
          # Save digest to environment for the signing step
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME:latest)
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> $GITHUB_ENV

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign the images with GitHub OIDC Token
        run: |
          cosign sign --yes ${IMAGE_DIGEST}
