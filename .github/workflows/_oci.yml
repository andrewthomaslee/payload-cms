name: Reusable Build and Push OCI
on:
  workflow_call:
    inputs:
      tag:
        description: 'The tag to use for the pushed images'
        required: false
        type: string
    secrets:
      DATABASE_URL:
        required: true
      PAYLOAD_SECRET:
        required: true
      CRON_SECRET:
        required: true
      PREVIEW_SECRET:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/payload-cms/site
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.tag }}
          flavor: latest=auto

      - name: Install WARP
        uses: Boostport/setup-cloudflare-warp@v1
        with:
          organization: ${{ vars.CF_WARP_ORG }}
          auth_client_id: ${{ secrets.CF_WARP_CLIENT_ID }}
          auth_client_secret: ${{ secrets.CF_WARP_CLIENT_SECRET }}
          configure_docker_dns: true

      - name: Test Connection
        run: curl --retry 3 --retry-delay 5 --max-time 10 whoami.whoami.svc.cluster.local

      # Add host DNS (which now includes WARP) into BuildKit
      - name: Discover Host DNS Namespace
        id: dns-discovery
        run: |
          NAMESERVER=$(grep nameserver /etc/resolv.conf | awk '{print $2}' | head -n 1)
          echo "nameserver=$NAMESERVER" >> $GITHUB_OUTPUT

      # Initialize Buildx WITH the explicitly declared DNS mapping
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
        with:
          driver-opts: |
            network=host
          buildkitd-flags: |
            --allow-insecure-entitlement network.host
          # Directs the inner build container to use the host's WARP DNS adapter
          buildkitd-config-inline: |
            [worker.oci]
              dns-search = ["cluster.local"]
              dns-nameservers = ["${{ steps.dns-discovery.outputs.nameserver }}"]

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.2.0
        env:
          BUILD_ENV_FILE: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            PREVIEW_SECRET=${{ secrets.PREVIEW_SECRET }}
            NEXT_PUBLIC_SERVER_URL=${{ vars.NEXT_PUBLIC_SERVER_URL }}
        with:
          network: host
          allow: network.host
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-envs: env-file=BUILD_ENV_FILE
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/payload-cms/site:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/payload-cms/site:buildcache,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign the images with GitHub OIDC Token
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/payload-cms/site
        run: |
          cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"
