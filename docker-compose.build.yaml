services:
  payload-cms:
    build:
      context: .
    pull_policy: always
    container_name: payload-cms
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    volumes:
      - media:/app/public/media
      - nextcache:/app/.next/cache

volumes:
  media:
  nextcache:
